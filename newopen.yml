openapi: 3.0.3
info:
  title: gugu-api
  version: 1.0.0
  description: gugu API의 상태 확인 및 인증 관련 엔드포인트 명세
servers:
  - url: https://price-eye.duckdns.org
    description: Production
  - url: http://localhost:8080
    description: Local
tags:
  - name: 상태 확인
    description: 서버 상태 확인 API
  - name: 인증
    description: 회원가입, 이메일 인증, 로그인 API
  - name: 외부 연동
    description: 외부 서비스 연결 및 상태 조회 API
  - name: 상품
    description: 상품 상세 조회 API
  - name: 유저 저장 상품
    description: Tracked Items 조회, 추가, 삭제 API
  - name: 가격 알림
    description: 상품 가격 변동 알림 등록/해제/조회 API
  - name: 디스커버
    description: 상품 탐색 및 추천 API
paths:
  /health:
    get:
      tags:
        - 상태 확인
      summary: 서버 상태 확인
      description: 서버가 정상적으로 요청을 처리할 수 있는지 확인한다.
      operationId: healthCheck
      responses:
        '200':
          description: 서버가 정상 상태다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                success:
                  value:
                    result: SUCCESS
                    data:
                      status: ok
  /v1/auth/register/email:
    post:
      tags:
        - 인증
      summary: 이메일 회원가입
      description: 이메일과 비밀번호로 계정을 만들고 6자리 인증 코드를 발송한다.
      operationId: registerEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmailRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: secret123!
                  display_name: Gugu User
      responses:
        '201':
          description: 회원가입이 완료되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEmailResponse'
        '400':
          description: 요청 형식이 잘못되었거나 비즈니스 규칙을 위반했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                duplicateEmail:
                  value:
                    result: ERROR
                    error:
                      code: G1000
                      message: email already exists
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/login/email:
    post:
      tags:
        - 인증
      summary: 이메일 로그인
      description: 이메일과 비밀번호가 맞으면 JWT access token과 refresh token을 발급한다.
      operationId: loginEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEmailRequest'
      responses:
        '200':
          description: 로그인에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 요청 형식이 잘못되었거나 이메일 인증이 완료되지 않았다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                emailNotVerified:
                  value:
                    result: ERROR
                    error:
                      code: G2001
                      message: email is not verified
        '401':
          description: 로그인 정보가 유효하지 않다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    result: ERROR
                    error:
                      code: G2000
                      message: invalid credentials
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/verify-email:
    post:
      tags:
        - 인증
      summary: 이메일 인증 코드 검증
      description: 회원가입 시 받은 6자리 인증 코드를 검증한다.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
            examples:
              default:
                value:
                  code: '123456'
      responses:
        '200':
          description: 이메일 인증이 완료되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          description: 요청 형식이 잘못되었거나 인증 코드를 찾을 수 없다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                codeNotFound:
                  value:
                    result: ERROR
                    error:
                      code: G2002
                      message: verification code not found
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/oauth/login:
    post:
      tags:
        - 인증
      summary: OAuth 로그인
      description: OAuth 공급자 정보로 로그인하거나 신규 사용자를 생성한 뒤 JWT 토큰을 발급한다.
      operationId: loginOAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginOAuthRequest'
      responses:
        '200':
          description: OAuth 로그인에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 요청 형식이 잘못되었거나 지원하지 않는 공급자다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                invalidProvider:
                  value:
                    result: ERROR
                    error:
                      code: G2003
                      message: oauth provider is invalid
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/refresh:
    post:
      tags:
        - 인증
      summary: Refresh token 재발급
      description: 유효한 refresh token으로 access token과 refresh token을 재발급한다.
      operationId: refreshAuthTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
            examples:
              default:
                value:
                  refresh_token: refresh-token-value
                  device_name: Chrome on Mac
      responses:
        '200':
          description: 토큰 재발급에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        '400':
          description: 요청 형식이 잘못되었거나 refresh token이 유효하지 않다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                invalidRefreshToken:
                  value:
                    result: ERROR
                    error:
                      code: G2004
                      message: refresh token is invalid
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/logout:
    post:
      tags:
        - 인증
      summary: 로그아웃
      description: 현재 refresh token 세션을 폐기한다. 클라이언트는 응답과 별개로 로컬 토큰도 즉시 삭제해야 한다.
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              default:
                value:
                  refresh_token: refresh-token-value
      responses:
        '200':
          description: 로그아웃에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  value:
                    result: SUCCESS
        '400':
          description: 요청 형식이 잘못되었거나 refresh token이 유효하지 않다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                invalidRefreshToken:
                  value:
                    result: ERROR
                    error:
                      code: G2004
                      message: refresh token is invalid
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/authorize-url:
    post:
      tags:
        - 외부 연동
      summary: AliExpress 인가 URL 생성
      description: |
        AliExpress seller authorization 화면으로 보내기 위한 URL을 생성한다. 운영자/개발자 전용.
        발급받은 access_token은 내부 TokenStore에 저장되어 상품 조회 API에서 자동으로 사용된다.
      operationId: buildAliExpressAuthorizationURL
      responses:
        '200':
          description: 인가 URL 생성에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressAuthorizationURLResponse'
        '400':
          description: 요청 형식이 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/exchange-code:
    post:
      tags:
        - 외부 연동
      summary: AliExpress 인가 code 교환
      description: |
        callback으로 받은 code를 AliExpress access_token으로 교환하고 내부 TokenStore에 저장한다. 운영자/개발자 전용.
        저장된 토큰은 상품 조회(product-detail, product-sku-detail) 및 tracked-items 추가 시 자동으로 사용된다.
      operationId: exchangeAliExpressCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AliExpressExchangeCodeRequest'
      responses:
        '200':
          description: code 교환 및 연결 저장에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressConnectionStatusResponse'
        '400':
          description: code가 유효하지 않거나 요청 형식이 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/refresh-token:
    post:
      tags:
        - 외부 연동
      summary: AliExpress access_token 갱신
      description: |
        저장된 refresh_token으로 access_token을 갱신한다. 운영자/개발자 전용.
        access_token은 24시간 만료이며, refresh_token(6개월)이 유효한 동안 갱신 가능하다.
        refresh_token 만료 시 authorize-url → exchange-code 재인증이 필요하다.
      operationId: refreshAliExpressToken
      responses:
        '200':
          description: 토큰 갱신에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressConnectionStatusResponse'
        '400':
          description: AliExpress API 에러가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 저장된 토큰이 없거나 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/connection-status:
    get:
      tags:
        - 외부 연동
      summary: AliExpress 연결 상태 조회
      description: 내부에 저장된 AliExpress seller 연결 상태를 조회한다. token 원문은 반환하지 않는다.
      operationId: getAliExpressConnectionStatus
      responses:
        '200':
          description: 연결 상태 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressConnectionStatusResponse'
        '400':
          description: 요청 형식이 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/categories:
    get:
      tags:
        - 외부 연동
      summary: AliExpress Affiliate 카테고리 목록 조회
      description: |
        AliExpress Affiliate API를 호출하여 전체 카테고리 목록을 조회한다. 개발자 확인용.
        카테고리 ID는 상품 목록 조회(`/products`)의 `category_ids` 파라미터에 사용할 수 있다.
      operationId: getAliExpressCategories
      responses:
        '200':
          description: 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressCategoryResponse'
        '400':
          description: AliExpress API 에러가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/products:
    get:
      tags:
        - 외부 연동
      summary: AliExpress Affiliate 상품 목록 조회
      description: |
        AliExpress Affiliate API를 호출하여 조건에 맞는 상품 목록을 조회한다. 개발자 확인용.
        내부 TokenStore에 저장된 access_token을 자동으로 사용한다.
        토큰이 없으면 access_token 없이 호출되어 빈 결과가 반환될 수 있다.
      operationId: getAliExpressProducts
      parameters:
        - in: query
          name: keywords
          schema:
            type: string
          description: 검색 키워드
          example: 'mp3'
        - in: query
          name: category_ids
          schema:
            type: string
          description: 카테고리 ID 목록 (쉼표 구분)
        - in: query
          name: min_sale_price
          schema:
            type: string
          description: 최소 판매가 (cent 단위)
        - in: query
          name: max_sale_price
          schema:
            type: string
          description: 최대 판매가 (cent 단위)
        - in: query
          name: page_no
          schema:
            type: string
          description: 페이지 번호
        - in: query
          name: page_size
          schema:
            type: string
          description: 페이지당 레코드 수 (1-50)
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - SALE_PRICE_ASC
              - SALE_PRICE_DESC
              - LAST_VOLUME_ASC
              - LAST_VOLUME_DESC
          description: 정렬 방식
        - in: query
          name: ship_to_country
          schema:
            type: string
          description: 배송 국가 코드
          example: 'KR'
        - in: query
          name: tracking_id
          schema:
            type: string
          description: 사용자 trackingID
      responses:
        '200':
          description: 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressProductQueryResponse'
        '400':
          description: 요청 형식이 잘못되었거나 AliExpress API 에러가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/product-detail:
    get:
      tags:
        - 외부 연동
      summary: AliExpress Affiliate 상품 상세 조회
      description: |
        AliExpress Affiliate API를 호출하여 상품 상세 정보를 조회한다. 개발자 확인용.
        내부 TokenStore에 저장된 access_token을 자동으로 사용한다.
        토큰이 없으면 access_token 없이 호출되어 빈 결과가 반환될 수 있다.
      operationId: getAliExpressProductDetail
      parameters:
        - in: query
          name: product_id
          required: true
          schema:
            type: string
          description: AliExpress 외부 상품 ID
          example: '1005010555086223'
      responses:
        '200':
          description: 조회에 성공했다. 상품이 없으면 빈 products 배열을 반환한다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressProductDetailResponse'
        '400':
          description: 요청 형식이 잘못되었거나 AliExpress API 에러가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/product-sku-detail:
    get:
      tags:
        - 외부 연동
      summary: AliExpress Affiliate 상품 SKU 상세 조회
      description: |
        AliExpress Affiliate API를 호출하여 상품 SKU 정보를 조회한다. 개발자 확인용.
        내부 TokenStore에 저장된 access_token을 자동으로 사용한다.
        토큰이 없으면 access_token 없이 호출되어 빈 결과가 반환될 수 있다.
      operationId: getAliExpressProductSKUDetail
      parameters:
        - in: query
          name: product_id
          required: true
          schema:
            type: string
          description: AliExpress 외부 상품 ID
          example: '1005010555086223'
        - in: query
          name: sku_ids
          schema:
            type: string
          description: 조회할 SKU ID 목록 (쉼표 구분, 최대 20개). 미입력 시 전체 SKU 반환 (최대 20개 제한)
          example: '12000045375202022'
      responses:
        '200':
          description: 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressProductSKUDetailResponse'
        '400':
          description: 요청 형식이 잘못되었거나 AliExpress API 에러가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/ds-product:
    get:
      tags:
        - 외부 연동
      summary: AliExpress Dropshipping 상품 조회
      description: |
        AliExpress Dropshipping API를 호출하여 상품 정보와 전체 SKU를 조회한다. 개발자 확인용.
        Affiliate API에 없는 상품도 조회 가능하다.
        내부 TokenStore에 저장된 DROPSHIPPING access_token을 자동으로 사용한다.
      operationId: getAliExpressDSProduct
      parameters:
        - in: query
          name: product_id
          required: true
          schema:
            type: string
          description: AliExpress 외부 상품 ID
          example: '1005008965454164'
        - in: query
          name: ship_to_country
          schema:
            type: string
            default: KR
          description: 배송 대상 국가 (2자리 코드)
          example: KR
        - in: query
          name: target_currency
          schema:
            type: string
            default: KRW
          description: 표시 통화
          example: KRW
        - in: query
          name: target_language
          schema:
            type: string
            default: ko
          description: 표시 언어
          example: ko
      responses:
        '200':
          description: 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressDSProductResponse'
        '400':
          description: 요청 형식이 잘못되었거나 AliExpress API 에러가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/tracked-items/:
    get:
      tags:
        - 유저 저장 상품
      summary: Tracked Items 목록 조회
      description: 특정 유저가 대시보드에 저장한 활성 상품 목록을 조회한다.
      operationId: listTrackedItems
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
          description: 조회 대상 내부 사용자 ID
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: 다음 페이지 커서. 첫 요청 시 생략하고, 이후 응답의 next_cursor 값을 전달한다.
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: 한 번에 조회할 항목 수 (기본값 20, 최대 100)
      responses:
        '200':
          description: 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTrackedItemsResponse'
        '400':
          description: 요청 파라미터가 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - 유저 저장 상품
      summary: Tracked Item 추가 (1~5개)
      description: 유저가 전달한 마켓과 외부 상품 식별자로 내부 상품을 조회하거나 수집한 뒤 대시보드에 저장한다. 한 번에 최대 5개까지 추가할 수 있다.
      operationId: addTrackedItems
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTrackedItemRequest'
      responses:
        '201':
          description: 저장에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddTrackedItemResponse'
        '400':
          description: 요청 형식이 잘못되었거나 지원하지 않는 마켓, 상품을 찾을 수 없는 경우다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/tracked-items/{trackedItemID}:
