components:
  schemas:
    ResultType:
      type: string
      description: API 처리 결과 구분값
      enum:
        - SUCCESS
        - ERROR
    ErrorMessage:
      type: object
      description: 에러 응답 본문
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 애플리케이션 에러 코드
          example: E400
        message:
          type: string
          description: 사용자 또는 클라이언트가 확인할 에러 메시지
          example: invalid request body
        data:
          nullable: true
          description: 추가 에러 데이터
    ErrorResponse:
      type: object
      description: 공통 에러 응답 래퍼
      required:
        - result
        - error
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        error:
          $ref: '#/components/schemas/ErrorMessage'
    User:
      type: object
      description: 사용자 정보
      required:
        - id
        - email
        - display_name
        - email_verified
        - created_at
      properties:
        id:
          type: string
          description: 사용자 고유 ID
          example: user_01
        email:
          type: string
          format: email
          description: 사용자 이메일
          example: user@example.com
        display_name:
          type: string
          description: 화면 표시 이름
          example: Gugu User
        email_verified:
          type: boolean
          description: 이메일 인증 완료 여부
          example: false
        created_at:
          type: string
          format: date-time
          description: 계정 생성 시각
          example: '2026-03-14T12:00:00Z'
    Tokens:
      type: object
      description: 로그인 성공 시 발급되는 JWT 토큰 묶음
      required:
        - access_token
        - refresh_token
        - token_type
        - access_expires_at
        - refresh_expires_at
      properties:
        access_token:
          type: string
          description: API 인증에 사용하는 JWT access token
        refresh_token:
          type: string
          description: access token 재발급에 사용할 JWT refresh token
        token_type:
          type: string
          description: Authorization 헤더에 사용할 토큰 타입
          example: Bearer
        access_expires_at:
          type: string
          format: date-time
          description: access token 만료 시각
          example: '2026-03-14T12:15:00Z'
        refresh_expires_at:
          type: string
          format: date-time
          description: refresh token 만료 시각
          example: '2026-03-28T12:00:00Z'
    RegisterEmailRequest:
      type: object
      description: 이메일 회원가입 요청
      required:
        - email
        - password
        - display_name
      properties:
        email:
          type: string
          format: email
          description: 회원가입 이메일
        password:
          type: string
          format: password
          description: 로그인 비밀번호
        display_name:
          type: string
          description: 사용자 표시 이름
    LoginEmailRequest:
      type: object
      description: 이메일 로그인 요청
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: 로그인 이메일
        password:
          type: string
          format: password
          description: 로그인 비밀번호
    VerifyEmailRequest:
      type: object
      description: 이메일 인증 코드 검증 요청
      required:
        - code
      properties:
        code:
          type: string
          description: 이메일로 전달된 6자리 인증 코드
          example: '123456'
    LoginOAuthRequest:
      type: object
      description: OAuth 로그인 요청
      required:
        - provider
        - subject
        - email
        - display_name
      properties:
        provider:
          type: string
          description: OAuth 공급자 이름
          example: google
        subject:
          type: string
          description: 공급자가 내려준 사용자 식별자
          example: oauth-subject-123
        email:
          type: string
          format: email
          description: 공급자 기준 이메일
        display_name:
          type: string
          description: 공급자 기준 표시 이름
    RefreshTokenRequest:
      type: object
      description: refresh token 재발급 요청
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: 재발급에 사용할 refresh token
        device_name:
          type: string
          description: 클라이언트 기기 이름
          example: Chrome on Mac
    LogoutRequest:
      type: object
      description: 로그아웃 요청
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: 폐기할 현재 refresh token
    AliExpressExchangeCodeRequest:
      type: object
      description: AliExpress callback code 교환 요청
      required:
        - code
      properties:
        code:
          type: string
          description: AliExpress callback 으로 받은 authorization code
          example: ali-code-123
    AddTrackedItemRequest:
      type: object
      description: 유저 저장 상품 추가 요청 (1~5개)
      required:
        - items
      properties:
        items:
          type: array
          description: 추가할 상품 목록 (최소 1개, 최대 5개)
          minItems: 1
          maxItems: 5
          items:
            type: object
            required:
              - original_url
              - provider_commerce
              - external_product_id
            properties:
              original_url:
                type: string
                description: 사용자가 붙여넣은 원본 URL
                example: https://www.aliexpress.com/item/1005000000000000.html
              provider_commerce:
                type: string
                description: 프론트가 판별한 마켓 식별자
                example: ALIEXPRESS
              external_product_id:
                type: string
                description: 프론트가 추출한 외부 상품 식별자
                example: '1005000000000000'
              currency:
                type: string
                description: 유저가 원하는 통화 (KRW, USD). 미지정 시 상품 대표 통화 사용.
                example: KRW
    HealthData:
      type: object
      description: 상태 확인 응답 데이터
      required:
        - status
      properties:
        status:
          type: string
          description: 서버 상태값
          example: ok
    HealthResponse:
      type: object
      description: 상태 확인 성공 응답
      required:
        - result
